name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    # 1. Setup Python
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    # 2. Setup Node.js
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    # 2b. Setup R
    - name: Set up R
      uses: r-lib/actions/setup-r@v2
      with:
        use-public-rspm: true

    - name: Install R dependencies
      run: |
        Rscript -e "install.packages('jsonlite')"

    # 3. Test Python local install
    - name: Install BiGI (Python Package)
      run: |
        python -m pip install --upgrade pip
        pip install -e .

    # 4. Verify Python CLI execution
    - name: Verify Python CLI
      run: |
        bigi --help

    # 5. Verify Node wrapper execution (npx)
    - name: Verify npx wrapper CLI
      run: |
        chmod +x bin/bigi.js
        npx ./ --help

    # 6. Run Test Pipeline compilation
    - name: Test compile visualization on test_pipeline
      run: |
        bigi analyze tests/test_pipeline --html tests/test_pipeline/visualization.html
