name: BiGI Blast Radius Report

on:
  pull_request:
    branches: [main, master]

permissions:
  contents: read
  pull-requests: write

jobs:
  analyze-impact:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run BiGI Blast Radius
        uses: ./              # Use the local composite action at repo root
        with:
          pipeline-dir: '.'
          python-version: '3.11'
