name: 'BiGI Blast Radius'
description: >
  Analyze a bioinformatics pipeline with BiGI and post a blast radius report as
  a PR comment showing which downstream rules and functions are affected by the
  changes in this pull request.
author: 'BDB-Genomics'

branding:
  icon: 'git-pull-request'
  color: 'purple'

inputs:
  pipeline-dir:
    description: >
      Root directory of the pipeline to analyze (relative to the repository root).
    required: false
    default: '.'
  python-version:
    description: 'Python version to use for running BiGI.'
    required: false
    default: '3.11'

runs:
  using: 'composite'
  steps:
    # ── 1. Ensure we have full git history for diff detection ──
    - name: Checkout (full history)
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    # ── 2. Python toolchain ──
    - name: Set up Python ${{ inputs.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    # ── 3. Install BiGI ──
    - name: Install BiGI
      shell: bash
      run: pip install "bigi @ git+https://github.com/BDB-Genomics/BiGI.git"

    # ── 4. Build the dependency graph (uses GITHUB_BASE_REF for diff detection) ──
    - name: Run BiGI Analysis
      shell: bash
      env:
        GITHUB_BASE_REF: ${{ github.base_ref }}
      run: bigi analyze "${{ inputs.pipeline-dir }}"

    # ── 5. Generate a Markdown blast-radius report ──
    - name: Generate PR Impact Report
      shell: bash
      run: bigi pr-report --output pr_comment.md --pipeline-dir "${{ inputs.pipeline-dir }}"

    # ── 6. Post (or update) the comment on the pull request ──
    - name: Comment on PR
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const body = fs.readFileSync('pr_comment.md', 'utf8');
          const marker = '<!-- bigi-blast-radius -->';
          const fullBody = `${marker}\n${body}`;

          // Find an existing BiGI comment so we update instead of spamming
          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
          });
          const existing = comments.find(c => c.body.includes(marker));

          if (existing) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: existing.id,
              body: fullBody,
            });
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: fullBody,
            });
          }
